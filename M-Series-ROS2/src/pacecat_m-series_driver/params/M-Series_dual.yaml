/**:
  ros__parameters:
    frame_id: map2 #must be different with M-Series.yaml
    lidar_ip: 192.168.158.99 #must be different with M-Series.yaml
    lidar_port: 6543
    listen_port: 6669   #must be different with M-Series.yaml
    output_custommsg: true
    output_imu: true
    output_pointcloud: true
    topic_custommsg: custommsg2
    topic_imu: imu2
    topic_pointcloud: pointcloud2
    ptp_enable: -1
    frame_package_num: 150
    timemode: 0
    adapter: eth0    #lidar connected network card name, use command "ifconfig" to check
#sfp
    sfp_enable : 0
    window: 1
    min_angle: 5.0
    max_angle: 175.0
    effective_distance: 5.0
#dfp
    dfp_enable: 0
    continuous_times: 30
    dirty_factor: 0.01

#pfp
    pfp_enable: 0
    window_num: 10
    threshold: 1.0
    effective: 2.0

#matrix rotate  roll/pitch/yaw: angle value(not radian value)  x/y/z:distance unit  m
    mr_enable: 0
    roll: 45.0
    pitch: 0.0
    yaw: 0.0
    x: 0.0
    y: 0.0
    z: 0.0


